name: express_administrator
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # utility package
  intl: ^0.20.3
  lottie: ^3.4.0
  shimmer: ^3.0.0
  clipboard: ^3.0.14
  url_launcher: ^6.3.2
  image_picker: ^1.2.3
  flutter_dropzone: ^4.2.1
  flutter_typeahead: ^6.0.0
  connectivity_plus: ^7.2.0
  multi_select_flutter: ^4.1.3
  cached_network_image: ^3.4.1
  flutter_native_splash: ^2.4.8
  smooth_page_indicator: ^2.0.1

  # web package
  web: ^1.1.1
  http: ^1.6.0
  html: ^0.15.6
  data_table_2: ^2.7.2
  dynamic_path_url_strategy: ^1.0.0
  fl_chart: ^1.2.0

  # firebase package
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  firebase_storage: ^13.4.3
  cloud_firestore: ^6.6.0

  # icons
  iconsax: ^0.0.8
  hugeicons: ^1.1.7
  cupertino_icons: ^1.0.8

  # state management
  get: ^4.7.3
  get_storage: ^2.1.1

  # animations

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/fonts/
    - assets/images/

  fonts:
    - family: Montserrat
      fonts:
        - asset: assets/fonts/Montserrat-Light.ttf
          weight: 300
        - asset: assets/fonts/Montserrat-Regular.ttf
          weight: 400
        - asset: assets/fonts/Montserrat-Medium.ttf
          weight: 500
        - asset: assets/fonts/Montserrat-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Montserrat-Bold.ttf
          weight: 700
        - asset: assets/fonts/Montserrat-ExtraBold.ttf
          weight: 800